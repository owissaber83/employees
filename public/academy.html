      background: linear-gradient(to left, #2563EB, #9333EA);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 0;

    .btn-glow:hover::before {
      opacity: 1;

      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }

      animation: fadeInUp 0.8s ease-out forwards;
    }

    .animate-fadeIn {
      animation: fadeIn 0.8s ease-out forwards;

      content: `<h3>التكاليف المباشرة</h3><p>يمكن تحديدها مباشرة لمشروع معين.</p><h4>1. تكاليف المواد المباشرة</h4><ul><li>خرسانة، حديد، طوب، أسمنت</li><li>مواد التشطيب</li></ul><div class="example-box"><strong>💡 بطاقة تكلفة المواد:</strong><br>أسمنت: 500 كيس × 20 = 10,000<br>حديد: 10 طن × 3,500 = 35,000<br>طوب: 20,000 × 1.5 = 30,000<br>خرسانة: 200 م³ × 300 = 60,000<br><strong>الإجمالي: 135,000 ريال</strong></div><h4>2. تكاليف العمالة المباشرة</h4><ul><li>العمالة الماهرة (نجارين، حدادين)</li><li>العمالة غير الماهرة</li><li>الإشراف الميداني</li></ul><div class="example-box"><strong>💡 كشف العمالة - يناير 2024:</strong><br>المشروع: فيلا رقم 123<br><br>نجار: 20 يوم × 8 ساعات × 50 ريال = 8,000<br>حداد: 15 يوم × 8 ساعات × 60 ريال = 7,200<br>كهربائي: 10 أيام × 8 ساعات × 55 ريال = 4,400<br>عمال: 30 يوم × 8 ساعات × 25 ريال = 6,000<br>مشرف موقع: 25 يوم × 8 ساعات × 80 ريال = 16,000<br><br><strong>إجمالي العمالة المباشرة: 41,600 ريال</strong></div><h4>3. تكاليف المعدات المباشرة</h4><ul><li>إهلاك المعدات المستخدمة في المشروع</li><li>إيجار المعدات</li><li>الوقود والصيانة</li></ul><div class="example-box"><strong>💡 مثال - معدة رافعة:</strong><br>• إهلاك شهري: 5,000 ريال<br>• وقود: 3,000 ريال<br>• سائق: 4,000 ريال<br>• صيانة: 1,000 ريال<br><strong>الإجمالي الشهري: 13,000 ريال</strong></div><h3>التكاليف غير المباشرة (Overhead)</h3><p>لا يمكن تخصيصها مباشرة لمشروع معين.</p><ul><li>إدارة المكتب الرئيسي</li><li>رواتب الإدارة العليا</li><li>إيجار المكاتب الإدارية</li><li>التأمينات العامة</li><li>تكاليف العطاءات</li></ul><h4>أسس توزيع التكاليف غير المباشرة</h4><ol><li><strong>ساعات العمل المباشرة:</strong> الأكثر شيوعاً</li><li><strong>التكاليف المباشرة:</strong> نسبة من إجمالي التكاليف</li><li><strong>الإيرادات:</strong> نسبة من إيرادات المشروع</li><li><strong>ساعات المعدات:</strong> للمشاريع كثيفة المعدات</li></ol><div class="formula-box"><strong>معدل التكاليف غير المباشرة = إجمالي التكاليف غير المباشرة ÷ أساس التوزيع</strong></div><div class="example-box"><strong>💡 مثال:</strong><br>إجمالي التكاليف غير المباشرة السنوية: 1,200,000 ريال<br>إجمالي ساعات العمل المباشرة: 60,000 ساعة<br><br>المعدل = 1,200,000 ÷ 60,000 = 20 ريال/ساعة<br><br>مشروع استهلك 5,000 ساعة:<br>التكاليف غير المباشرة = 5,000 × 20 = 100,000 ريال</div><div class="tip-box"><strong>✅ نصيحة:</strong> اختيار أساس التوزيع المناسب يؤثر بشكل كبير على دقة ربحية المشاريع. راجع الأساس دورياً.</div><h3>ترميز التكاليف وهيكل تجزئة العمل (Cost Codes / WBS)</h3><p>الاحتراف يبدأ من <strong>نظام ترميز</strong> يربط كل مصروف ببندٍ وبمشروع. مثال: كود <code>03-200-MAT</code> = (مشروع 03) / (بند أعمال خرسانة 200) / (مواد). هذا يتيح مقارنة <strong>الفعلي بالموازنة على مستوى كل بند</strong>، وهو ما يميّز المحاسب المحترف.</p><div class="content-box"><strong>📊 تقرير التكلفة المهني (Cost Report) يعرض لكل بند:</strong> الموازنة | الملتزَم به (أوامر الشراء) | الفعلي المنصرف | المتوقّع حتى الإكمال | الانحراف.</div><div class="warning-box"><strong>⚠️ خطأ شائع:</strong> تحميل تكلفة على المشروع الخطأ أو البند الخطأ يُفسد ربحية مشروعين معاً — دقّة الترميز عند إدخال الفاتورة أهم من سرعتها.</div>`

      content: `<h3>أسس التوزيع بالتفصيل</h3><h4>1. أساس ساعات العمل المباشرة</h4><div class="formula-box"><strong>معدل التوزيع = إجمالي التكاليف غير المباشرة ÷ إجمالي ساعات العمل</strong></div><h4>2. أساس التكاليف المباشرة</h4><div class="formula-box"><strong>معدل التوزيع = (التكاليف غير المباشرة ÷ التكاليف المباشرة) × 100</strong></div><div class="example-box"><strong>💡 مقارنة:</strong><br>تكاليف غير مباشرة: 1,000,000<br>تكاليف مباشرة: 5,000,000<br>معدل التوزيع: (1,000,000 ÷ 5,000,000) × 100 = 20%<br><br>مشروع بتكاليف مباشرة 800,000:<br>التكاليف غير المباشرة = 800,000 × 20% = 160,000</div><h3>التكاليف المشتركة</h3><p>تكاليف تخدم عدة مشاريع معاً (معدات، ورشة مركزية).</p><h3>التحميل الزائد والناقص (Over / Under Absorption)</h3><p>نوزّع التكاليف غير المباشرة بمعدّل <strong>تقديري</strong> أول العام، ثم نقارنه بالفعلي:</p><div class="formula-box"><strong>فرق التحميل = المُحمَّل بالمعدّل − التكاليف الفعلية غير المباشرة</strong></div><ul><li>المُحمَّل أكثر من الفعلي ← <strong>تحميل زائد</strong> (Over-absorbed).</li><li>المُحمَّل أقل من الفعلي ← <strong>تحميل ناقص</strong> (Under-absorbed) يُحمَّل على تكلفة الفترة.</li></ul><div class="example-box"><strong>💡 مثال:</strong><br>المعدّل التقديري 20 ريال/ساعة، الساعات الفعلية 55,000 ← المُحمَّل = 1,100,000.<br>التكاليف الفعلية غير المباشرة = 1,180,000.<br><strong>تحميل ناقص = 80,000</strong> يُعالَج بقيد تسوية على تكلفة الفترة.</div><div class="tip-box"><strong>💼 من واقع الخبرة:</strong> راجع معدّل التحميل عند تغيّر حجم النشاط جوهرياً؛ معدّل قديم يشوّه ربحية كل المشاريع دفعة واحدة.</div>`

t; الإيراد المعترف به ← التزام عقد (فوترة زائدة)</strong></div><div class="example-box"><strong>💡 مثال:</strong> اعترفنا بإيراد 2,500,000 وفوترنا مستخلصات 2,000,000 ← <strong>أصل عقد (إيراد غير مُفوتَر) 500,000</strong> يظهر في المركز المالي.</div><div class="tip-box"><strong>💼 سؤال المقابلة الكلاسيكي:</strong> «ما الفرق بين الإيراد والمستخلص؟» — الإيراد يقيس <em>ما أنجزتَه</em>، والمستخلص يقيس <em>ما طالبتَ به</em>، والفرق بينهما أصل عقد أو التزام عقد.</div>`

      content: `<h3>VLOOKUP - البحث العمودي</h3><div class="formula-box"><strong>=VLOOKUP(قيمة_البحث, النطاق, رقم_العمود, [مطابقة])</strong></div><div class="example-box"><strong>💡 مثال:</strong><br>البحث عن سعر منتج:<br>=VLOOKUP(A2,المنتجات!A:C,3,FALSE)<br><br>• A2: قيمة البحث (كود المنتج)<br>• المنتجات!A:C: نطاق البحث<br>• 3: العمود الثالث (السعر)<br>• FALSE: مطابقة تامة</div><h4>عيوب VLOOKUP</h4><ul><li>البحث في العمود الأول فقط</li><li>بطيء مع البيانات الكبيرة</li><li>لا يدعم الإدراج في الأعمدة</li></ul><h3>XLOOKUP - الجيل الجديد</h3><div class="formula-box"><strong>=XLOOKUP(قيمة_البحث, نطاق_البحث, نطاق_الإرجاع, [إذا_لم_يوجد], [وضع_المطابقة])</strong></div><div class="example-box"><strong>💡 مثال:</strong><br>=XLOOKUP(A2,المنتجات!A:A,المنتجات!C:C,"غير موجود")<br><br>مميزات XLOOKUP:<br>• البحث في أي اتجاه<br>• معالجة الأخطاء المدمجة<br>• أسرع بكثير<br>• دعم البحث الثنائي</div><h3>INDEX + MATCH - القوة الحقيقية</h3><div class="formula-box"><strong>=INDEX(نطاق_الإرجاع, MATCH(قيمة_البحث, نطاق_البحث, 0))</strong></div><div class="example-box"><strong>💡 مثال:</strong><br>=INDEX(C:C,MATCH(A2,A:A,0))<br><br>مميزات:<br>• البحث في أي عمود<br>• دعم البحث ثنائي الاتجاه<br>• أكثر مرونة</div><h3>الفخّ القاتل: المطابقة التقريبية</h3><p>الوسيط الأخير في VLOOKUP: <strong>FALSE (مطابقة تامة)</strong> هو ما تريده 99% من الوقت. TRUE (تقريبية) يعطي نتائج خاطئة صامتة إن لم تكن البيانات مرتّبة — كارثة في التقارير المالية.</p><div class="content-box"><strong>📌 لماذا يفضّل المحترفون XLOOKUP أو INDEX+MATCH:</strong> يبحثان يميناً ويساراً، ولا ينكسران عند إدراج/حذف عمود (VLOOKUP يعتمد رقم عمود ثابت فينكسر).</div><div class="warning-box"><strong>⚠️ خطأ شائع:</strong> استخدام رقم عمود ثابت في VLOOKUP ثم إدراج عمود جديد → كل النتائج تنزاح خطأً دون أي تنبيه.</div><div class="tip-box"><strong>💼 سؤال المقابلة:</strong> «ما الفرق بين VLOOKUP و INDEX+MATCH؟» — الأخير أمرن وأسرع ولا يكسر عند تغيّر ترتيب الأعمدة.</div>`

><div class="warning-box"><strong>⚠️ أخطاء شائعة:</strong><br>• إبقاء الإيجار «تشغيلياً» خارج الميزانية لدى المستأجر (لم يعد جائزاً).<br>• إهمال إعادة القياس عند تعديل العقد.<br>• الخلط بين إهلاك أصل حق الاستخدام وفائدة الالتزام.</div><div class="content-box"><strong>🎯 أسئلة مقابلات:</strong><br>• كيف يختلف تصنيف الإيجار لدى المستأجر عن المؤجّر؟<br>• ما مكوّنا المصروف السنوي لأصل حق الاستخدام؟<br>• متى تستخدم معدل الاقتراض التزايدي؟</div>`

r>• ما مكوّنات معادلة ECL؟</div>`

ً مقطوعاً دون تفصيل النسبة.</div><div class="content-box"><strong>🎯 أسئلة مقابلات:</strong><br>• متى تستخدم فاتورة المطابقة ومتى الإبلاغ؟<br>• اذكر الحقول التي يحملها رمز QR.<br>• عميلك شركة ويطلب فاتورة تخوّله الخصم — أيّ نوع تُصدر؟</div>`

      explanation: 'مكوّنات الوعاء الزكوي والنسبة والإقرار.',
      content: `<h3>الزكاة في السعودية</h3><p>فريضة شرعية تُحصّلها ZATCA من المنشآت المملوكة لسعوديين/مواطني دول الخليج (وحصصهم في الشركات المختلطة).</p><h3>نسبة الزكاة</h3><div class="content-box">• <strong>2.5%</strong> للسنة الهجرية.<br>• <strong>2.577847%</strong> تقريباً للسنة الميلادية (لأنها أطول من الهجرية).</div><h3>وعاء الزكاة (الطريقة غير المباشرة)</h3><div class="formula-box"><strong>وعاء الزكاة = (حقوق الملكية + المخصصات + الالتزامات طويلة الأجل + التعديلات) − (صافي الأصول الثابتة + الاستثمارات طويلة الأجل + الخسائر المرحّلة القابلة للحسم)</strong></div><div class="content-box"><strong>📌 قاعدة مهمة:</strong> لا يقل وعاء الزكاة عن <strong>صافي الربح المعدّل</strong> للسنة.</div><div class="example-box"><strong>💡 مثال مبسّط:</strong><br>حقوق ملكية 4,000,000 + مخصصات 300,000 + قرض طويل الأجل 1,000,000 = 5,300,000<br>يُخصم: صافي أصول ثابتة 2,000,000 + استثمارات طويلة 500,000 = 2,500,000<br>وعاء الزكاة = 5,300,000 − 2,500,000 = <strong>2,800,000</strong><br>الزكاة = 2,800,000 × 2.5% = <strong>70,000 ريال</strong></div><div class="content-box"><strong>📚 القيد المحاسبي:</strong><br>من ح/ مصروف الزكاة 70,000<br>إلى ح/ الزكاة المستحقة 70,000</div><div class="tip-box"><strong>✅ الإقرار:</strong> يُقدَّم الإقرار الزكوي خلال <strong>120 يوماً</strong> من نهاية السنة المالية.</div><h3>🎓 تعمّق احترافي</h3><h4>مبدأ الحسم — لماذا نطرح الأصول الثابتة؟</h4><div class="content-box">تُطرح الأصول طويلة الأجل (الثابتة والاستثمارات) لأنها <strong>مموّلة من مصادر التمويل الزكوية</strong> نفسها (حقوق الملكية والقروض)، فطرحها يمنع ازدواج فرض الزكاة على المال ذاته — بشرط أن يكون التمويل زكوياً.</div><h4>الطريقة المباشرة (للتحقق)</h4><p>تُجمع الموجودات الزكوية (النقد، المدينون، المخزون، الاستثمارات قصيرة الأجل) ويُطرح منها الالتزامات المتداولة، ثم تُقارن النتيجة بالطريقة غير المباشرة.</p><div class="example-box"><strong>💡 قاعدة الحد الأدنى (الوعاء ≥ الربح):</strong><br>لو نتج وعاء 2,800,000 لكن صافي الربح المعدّل 3,000,000 → يُعتمد <strong>3,000,000</strong> (الأعلى)، والزكاة = 75,000.</div><div class="tip-box"><strong>💼 من واقع الخبرة:</strong> جهّز «ورقة تسوية الوعاء الزكوي» بنداً بنداً من ميزان المراجعة ووثّق كل حسم بمستنده — هي أول ما يطلبه فاحص ZATCA وتوفّر ساعات عند الربط الزكوي.</div><div class="warning-box"><strong>⚠️ أخطاء شائعة:</strong><br>• حسم أصول ثابتة مموّلة بقروض قصيرة الأجل (لا تُحسم).<br>• إغفال قاعدة «الوعاء لا يقل عن الربح المعدّل».<br>• الخلط بين معالجة حصة السعوديين (زكاة) والأجانب (دخل) في الشركة المختلطة.</div><div class="content-box"><strong>🎯 أسئلة مقابلات:</strong><br>• لماذا تُطرح الأصول الثابتة من وعاء الزكاة؟<br>• ما الفرق بين الطريقة المباشرة وغير المباشرة؟<br>• كيف تُعامَل الشركة المختلطة زكوياً وضريبياً؟</div>`

      content: `<h3>ضريبة الاستقطاع (Withholding Tax)</h3><p>ضريبة تُستقطع من <strong>مدفوعات المنشأة المقيمة إلى أطراف غير مقيمة</strong> مقابل خدمات/حقوق حقّقت دخلاً من مصدر في السعودية.</p><h3>النِسب حسب نوع الدفعة</h3><table><tr><th>نوع الدفعة</th><th>النسبة</th></tr><tr><td>الإيجار</td><td>5%</td></tr><tr><td>الخدمات الفنية والاستشارية</td><td>5%</td></tr><tr><td>تذاكر/شحن/بريد جوي دولي</td><td>5%</td></tr><tr><td>أرباح الأسهم / الفوائد</td><td>5%</td></tr><tr><td>الإتاوات (Royalties)</td><td>15%</td></tr><tr><td>أتعاب إدارة (Management fees)</td><td>20%</td></tr><tr><td>مدفوعات أخرى</td><td>15%</td></tr></table><div class="content-box"><strong>📅 الموعد:</strong> تُورَّد الضريبة المستقطعة إلى ZATCA خلال <strong>أول 10 أيام</strong> من الشهر التالي لشهر الدفع.</div><div class="example-box"><strong>💡 مثال:</strong><br>دفع أتعاب استشارية لشركة غير مقيمة 100,000 ريال.<br>ضريبة الاستقطاع = 100,000 × 5% = 5,000<br>يُحوَّل للمورّد 95,000، وتُورَّد 5,000 للهيئة.<br><br>القيد:<br>من ح/ مصروف الاستشارات 100,000<br>إلى ح/ المورّد غير المقيم 95,000<br>إلى ح/ ضريبة استقطاع مستحقة 5,000</div><div class="warning-box"><strong>⚠️ اتفاقيات تجنّب الازدواج الضريبي:</strong> قد تخفّض بعض الاتفاقيات النسب — تحقّق من الاتفاقية مع دولة المورّد.</div><h3>🎓 تعمّق احترافي</h3><h4>من المسؤول عن التوريد؟</h4><div class="content-box">المسؤولية على <strong>الطرف المقيم الدافع</strong> (وكيل الاستقطاع) لا على المورّد غير المقيم. فإن لم يستقطع، يتحمّل الضريبة والغرامة من جيبه.</div><h4>الإقرارات والشهادات</h4><p>يُقدَّم إقرار استقطاع <strong>شهري</strong> خلال أول 10 أيام من الشهر التالي، وإقرار <strong>سنوي</strong> ملخّص، وتُصدَر <strong>شهادة استقطاع</strong> للمورّد لينتفع بها في بلده.</p><div class="example-box"><strong>💡 أثر اتفاقية تجنّب الازدواج:</strong><br>إتاوة 200,000 لمورّد في دولة اتفاقيتها تخفّض النسبة من 15% إلى 10%:<br>الاستقطاع = 200,000 × 10% = 20,000 بدل 30,000 (بشرط شهادة إقامة ضريبية معتمدة).</div><div class="tip-box"><strong>💼 من واقع الخبرة:</strong> احصل على <strong>شهادة الإقامة الضريبية</strong> من المورّد قبل تطبيق نسبة الاتفاقية المخفّضة، وإلا طالبتك الهيئة بالفرق. واستقطع من <strong>إجمالي</strong> الدفعة لا صافيها.</div><div class="warning-box"><strong>⚠️ أخطاء شائعة:</strong><br>• عدم الاستقطاع ظناً أن المورّد سيدفع في بلده.<br>• تطبيق نسبة الاتفاقية دون شهادة إقامة ضريبية.<br>• الخلط بين نسبة الخدمات الفنية (5%) وأتعاب الإدارة (20%).</div><div class="content-box"><strong>🎯 أسئلة مقابلات:</strong><br>• من المسؤول قانوناً عن توريد ضريبة الاستقطاع؟<br>• ما نسب الاستقطاع على الإتاوات وأتعاب الإدارة والخدمات الفنية؟<br>• ما دور اتفاقيات تجنّب الازدواج الضريبي؟</div>`

      content: `<h3>ضريبة الدخل</h3><p>تُفرض على <strong>حصة المستثمر غير السعودي/غير الخليجي</strong> من صافي الربح المعدّل.</p><div class="content-box"><strong>النسبة الأساسية: 20%</strong> من الوعاء الضريبي (مع نسب خاصة لبعض القطاعات مثل النفط والغاز).</div><h3>الشركات المختلطة</h3><div class="formula-box"><strong>الشركة المختلطة: زكاة على حصة السعوديين/الخليجيين + ضريبة دخل على حصة الأجانب</strong></div><div class="example-box"><strong>💡 مثال:</strong><br>شركة صافي ربحها المعدّل 1,000,000، مملوكة 70% لسعوديين و30% لأجنبي.<br>• حصة الأجنبي = 300,000 → ضريبة دخل 20% = <strong>60,000</strong><br>• حصة السعوديين تُعامَل زكوياً ضمن وعاء الزكاة.</div><h3>الوعاء الضريبي</h3><p>صافي الربح المحاسبي <strong>معدّلاً</strong> بالمصروفات غير المسموح بها (كالغرامات والمخصصات غير المحققة) والإيرادات المعفاة.</p><div class="tip-box"><strong>✅ الربط مع النظام:</strong> «مركز الضرائب والامتثال» في نظامكم يجمع القيمة المضافة والاستقطاع والزكاة والدخل مع تقويم مواعيد الهيئة.</div><h3>🎓 تعمّق احترافي</h3><h4>من الربح المحاسبي إلى الوعاء الضريبي</h4><div class="content-box">يُعدَّل الربح المحاسبي بـ:<br>• <strong>إضافة</strong> المصروفات غير المقبولة (الغرامات، المخصصات غير المحققة، مصروفات لا تخصّ النشاط).<br>• <strong>استبدال</strong> الإهلاك المحاسبي بالإهلاك <strong>النظامي</strong> (مجموعات ونِسب محددة).<br>• <strong>حسم</strong> الخسائر المرحّلة (بحدود نظامية) والإيرادات المعفاة.</div><div class="example-box"><strong>💡 تعديل الوعاء:</strong><br>ربح محاسبي 1,000,000 + غرامات غير مقبولة 50,000 + مخصص غير محقق 30,000 = وعاء 1,080,000.<br>حصة أجنبي 30% = 324,000 → ضريبة دخل 20% = 64,800.</div><h4>الدفعات المعجّلة</h4><p>قد تُلزَم المنشأة بدفعات معجّلة على ثلاث دفعات خلال السنة إذا تجاوزت ضريبة العام السابق حدّاً معيّناً، وتُخصم من الربط النهائي.</p><div class="tip-box"><strong>💼 من واقع الخبرة:</strong> امسك <strong>جدول فروقات دائمة ومؤقتة</strong> بين المحاسبي والضريبي طوال السنة لا في نهايتها — يجعل إعداد الإقرار دقيقاً ويكشف الضريبة المؤجلة (IAS 12) مبكراً.</div><div class="warning-box"><strong>⚠️ أخطاء شائعة:</strong><br>• خصم الإهلاك المحاسبي بدل النظامي.<br>• معاملة كل ربح الشركة المختلطة زكاةً أو ضريبةً بالكامل.<br>• إغفال الدفعات المعجّلة فتتراكم الغرامات.</div><div class="content-box"><strong>🎯 أسئلة مقابلات:</strong><br>• كيف تنتقل من الربح المحاسبي إلى الوعاء الضريبي؟<br>• كيف تُعامَل الشركة المختلطة بين الزكاة والدخل؟<br>• ما الفروقات الدائمة والمؤقتة وأثرها على الضريبة المؤجلة؟</div>`

      content: `<h3>الهيئة السعودية للمراجعين والمحاسبين (SOCPA)</h3><p>الجهة المنظِّمة لمهنة المحاسبة والمراجعة في السعودية. تمنح شهادة <strong>الزمالة (Fellowship)</strong> — أعلى مؤهل مهني محلي، ويُطلق على حاملها <strong>المحاسب القانوني المعتمد</strong>، وتؤهله لمزاولة مهنة المراجعة القانونية.</p><h3>شروط التقدّم (عامة)</h3><ul><li>مؤهل جامعي في المحاسبة (أو تخصص ذي صلة بشروط)</li><li>التسجيل في الهيئة واستيفاء المتطلبات</li></ul><h3>مواد الاختبار</h3><table><tr><th>#</th><th>المادة</th></tr><tr><td>1</td><td>المحاسبة (وفق المعايير المعتمدة)</td></tr><tr><td>2</td><td>مراجعة الحسابات والتأكيد</td></tr><tr><td>3</td><td>الزكاة والضريبة</td></tr><tr><td>4</td><td>فقه المعاملات المالية</td></tr><tr><td>5</td><td>الأنظمة التجارية (القانون)</td></tr></table><div class="tip-box"><strong>✅ نصيحة:</strong> ذاكر كل مادة على حدة، واستخدم هذا المسار كخريطة، ثم تعمّق عبر دورات «المحاسبة» و«IFRS» و«الضرائب» في الأكاديمية.</div><div class="warning-box"><strong>⚠️ تنبيه:</strong> عدد المواد وطريقة الاختبار قد تتغيّر — اعتمد رسمياً على socpa.org.sa.</div><h3>استراتيجية اجتياز الزمالة (من واقع الخبرة)</h3><p>الزمالة ماراثون لا سباق سريع؛ النجاح يعتمد على <strong>خطة مواد متتابعة</strong> لا مذاكرة عشوائية.</p><ul><li>ابدأ بالمواد التي تتقنها (المحاسبة/الضريبة) لبناء الزخم والثقة.</li><li>خصّص وقتاً أكبر للفقه والأنظمة إن كانت خلفيتك محاسبية بحتة.</li><li>حُلّ <strong>أسئلة الدورات السابقة</strong> — نمط الأسئلة يتكرّر.</li></ul><div class="content-box"><strong>💼 القيمة المهنية:</strong> الزمالة تفتح باب <strong>مزاولة المراجعة القانونية</strong> والتوقيع على القوائم، وترفع سقف الراتب والمنصب (مدير مالي/شريك تدقيق) — عائدها على المدى الطويل من أعلى الشهادات محلياً.</div><div class="tip-box"><strong>✅ نصيحة الأستاذ:</strong> لا تؤجّل التقديم انتظاراً لـ«الاستعداد الكامل»؛ سجّل مادة واحدة والتزم بها — الاجتياز التدريجي أنجح من محاولة كل شيء دفعة واحدة.</div>`

      content: `<h3>المعايير المحاسبية المعتمدة</h3><p>اعتمدت الهيئة <strong>المعايير الدولية للتقارير المالية (IFRS)</strong> المعتمدة في السعودية للمنشآت المدرجة وغيرها، و<strong>IFRS للمنشآت الصغيرة والمتوسطة</strong> للمنشآت الأصغر.</p><h4>محاور المادة</h4><ul><li>عرض القوائم المالية والإفصاح (IAS 1)</li><li>الاعتراف والقياس (الإيراد IFRS 15، الأصول، الالتزامات)</li><li>القوائم الموحّدة والاستثمارات</li><li>الأدوات المالية والإيجارات</li></ul><div class="content-box"><strong>📚 الترابط:</strong> هذه المادة تتقاطع مع دورتَي «المحاسبة العامة» و«IFRS» في الأكاديمية — راجعهما للتعمّق.</div><div class="example-box"><strong>💡 سؤال نمطي:</strong> ما القيمة التي يُقاس بها الأصل الثابت مبدئياً وفق IAS 16؟ → <strong>التكلفة</strong> (سعر الشراء + تكاليف التجهيز للاستخدام).</div><h3>ما يركّز عليه اختبار مادة المحاسبة</h3><p>الأسئلة <strong>تطبيقية</strong> غالباً لا حفظية: يعطونك حالة ويطلبون المعالجة الصحيحة والقيد — أتقِن <strong>تطبيق</strong> المعيار لا نصّه فقط.</p><table><tr><th>المعيار</th><th>ما يُختبر كثيراً</th></tr><tr><td>IFRS 15</td><td>نموذج الخطوات الخمس وتوقيت الاعتراف</td></tr><tr><td>IFRS 16</td><td>إثبات حق الاستخدام والتزام الإيجار لدى المستأجر</td></tr><tr><td>IAS 16 / 36</td><td>القياس اللاحق والإهلاك وخسارة الانخفاض</td></tr><tr><td>IAS 37</td><td>المخصصات مقابل الالتزامات المحتملة</td></tr></table><div class="warning-box"><strong>⚠️ فخّ شائع:</strong> الخلط بين <strong>التغيّر في السياسة المحاسبية</strong> (بأثر رجعي) و<strong>التغيّر في التقدير</strong> (بأثر مستقبلي) — سؤال متكرّر.</div><div class="tip-box"><strong>💼 من واقع الخبرة:</strong> اربط كل معيار بقيده وبمثال رقمي؛ من يحفظ النص ولا يطبّقه يسقط في السؤال التطبيقي.</div>`

      content: `<h3>مراجعة الحسابات والتأكيد</h3><p>المراجعة فحص <strong>مستقل ومحايد</strong> للقوائم المالية لإبداء رأي فني حول عدالة عرضها وفق الإطار المحاسبي، وفق <strong>معايير المراجعة الدولية (ISA)</strong>.</p><h4>مفاهيم أساسية</h4><ul><li><strong>الأهمية النسبية</strong> (Materiality)</li><li><strong>خطر المراجعة</strong> = الخطر المتأصل × خطر الرقابة × خطر الاكتشاف</li><li><strong>أدلة الإثبات</strong> والعيّنات والاستقلالية والشك المهني</li></ul><h4>أنواع رأي المراجع</h4><table><tr><th>الرأي</th><th>المعنى</th></tr><tr><td>غير متحفظ (نظيف)</td><td>القوائم تعرض بعدالة وفق الإطار</td></tr><tr><td>متحفظ</td><td>تحفّظ على بند جوهري لكن غير منتشر</td></tr><tr><td>معارض (سلبي)</td><td>القوائم مضلّلة جوهرياً وبشكل منتشر</td></tr><tr><td>امتناع عن الرأي</td><td>تعذّر الحصول على أدلة كافية</td></tr></table><div class="tip-box"><strong>✅ تذكّر:</strong> استقلالية المراجع شرط جوهري لمصداقية الرأي.</div><h3>عملية المراجعة ومزاعم الإدارة (Assertions)</h3><p>يجمع المراجع أدلة لاختبار <strong>مزاعم</strong> القوائم: الوجود، الاكتمال، الحقوق والالتزامات، التقييم، العرض والإفصاح — وكل إجراء مراجعة يخدم مزعماً.</p><div class="content-box"><strong>📌 مراحل المراجعة:</strong> قبول العميل ← التخطيط وفهم المنشأة وتقييم المخاطر ← اختبارات الرقابة ← الإجراءات الجوهرية ← الإنهاء وإصدار التقرير.</div><div class="content-box"><strong>📄 هيكل تقرير المراجع الحديث:</strong> الرأي أولاً، ثم أساس الرأي، ثم <strong>الأمور الرئيسية للمراجعة (KAM)</strong>، فمسؤوليات الإدارة والمراجع.</div><div class="warning-box"><strong>⚠️ سؤال متكرّر:</strong> «متى متحفّظ ومتى معارض ومتى امتناع؟» المحدِّد بُعدان: <strong>الجوهرية</strong> و<strong>الانتشار (Pervasiveness)</strong> — أتقِن هذه المصفوفة.</div><div class="tip-box"><strong>💼 من واقع الخبرة:</strong> الاستقلالية والشك المهني ليسا شعارين — أسئلة الأخلاقيات في هذه المادة تُسقط الكثيرين، فذاكرها جيداً.</div>`

      content: `<h3>فقه المعاملات المالية</h3><p>مادة تختبر معرفة الأحكام الشرعية للمعاملات المالية — أساس التمويل والمحاسبة الإسلامية.</p><h4>مبادئ أساسية</h4><ul><li><strong>تحريم الربا</strong> (الزيادة في القرض أو تأخير البدلين في الصرف)</li><li><strong>تحريم الغرر</strong> (الجهالة الفاحشة) والميسر (المقامرة)</li></ul><h4>صيغ التمويل والبيوع</h4><table><tr><th>الصيغة</th><th>التعريف</th></tr><tr><td>المرابحة</td><td>بيع بربح معلوم متفق عليه فوق التكلفة</td></tr><tr><td>السلم</td><td>بيع آجل التسليم بثمن معجّل</td></tr><tr><td>الاستصناع</td><td>طلب صنع سلعة بمواصفات وثمن محدد</td></tr><tr><td>الإجارة</td><td>بيع منفعة معلومة بأجرة معلومة</td></tr><tr><td>المشاركة/المضاربة</td><td>اقتسام الربح باتفاق والخسارة بقدر المال</td></tr></table><div class="tip-box"><strong>✅ ملاحظة:</strong> الزكاة الشرعية (شروط النصاب والحول) تُختبر هنا إلى جانب البُعد النظامي.</div><h3>لماذا يهمّ المحاسب اليوم</h3><p>مع اتساع <strong>المصرفية والتمويل الإسلامي</strong>، صار المحاسب يعالج عقود المرابحة والإجارة والصكوك — ففهم حكمها الشرعي أساس محاسبتها الصحيحة (وفق معايير AAOIFI للمؤسسات الإسلامية).</p><div class="content-box"><strong>📌 من الحكم إلى القيد:</strong> المرابحة تُعالَج كبيع بربح مؤجّل؛ والإجارة المنتهية بالتمليك قريبة من الإيجار التمويلي؛ والصكوك تمثّل حصصاً في أصول لا ديناً بفائدة.</div><div class="warning-box"><strong>⚠️ ركائز يُبنى عليها كثير من الأسئلة:</strong> تحريم <strong>الربا</strong> (ربا الفضل والنسيئة)، و<strong>الغرر</strong>، و<strong>الميسر</strong> — ميّز بينها بأمثلة.</div><div class="tip-box"><strong>✅ نصيحة الأستاذ:</strong> اربط كل صيغة تمويل (مرابحة/سلم/استصناع/مشاركة) بمثال تطبيقي ومعالجته المحاسبية؛ الأسئلة تمزج الفقه بالتطبيق.</div>`

const acadKey = id => 'acad_prog_' + id;
const getDone = id => {
  try {
    return JSON.parse(localStorage.getItem(acadKey(id)) || '[]');
  } catch (e) {
    return [];
  }
};
const saveDone = (id, arr) => {
  try {
    localStorage.setItem(acadKey(id), JSON.stringify(arr));
  } catch (e) {}
};
const totalLessons = course => (course.curriculum || []).reduce((s, m) => s + (m.lessons ? m.lessons.length : 0), 0);

// ═══ مسيرتي: نقاط + سلسلة أيام + شارات + استكمال ═══
const acadStat = () => {
  try {
    return JSON.parse(localStorage.getItem('acad_stat') || '{}');
  } catch (e) {
    return {};
  }
};
const saveStat = s => {
  try {
    localStorage.setItem('acad_stat', JSON.stringify(s));
  } catch (e) {}
};
const touchStreak = () => {
  const s = acadStat();
  const today = new Date().toISOString().slice(0, 10);
  if (s.lastDay === today) return;
  const yest = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  s.streak = s.lastDay === yest ? (s.streak || 0) + 1 : 1;
  s.lastDay = today;
  saveStat(s);
};
const setLastLesson = (courseId, mod, les) => {
  const s = acadStat();
  s.last = {
    courseId,
    mod,
    les
  };
  saveStat(s);
};
const courseProg = c => {
  const done = getDone(c.id).length,
    total = totalLessons(c);
  return {
    done,
    total,
    pct: total ? Math.round(done / total * 100) : 0
  };
};
const overallProg = () => {
  let d = 0,
    t = 0;
  courses.forEach(c => {
    d += getDone(c.id).length;
    t += totalLessons(c);
  });
  return {
    done: d,
    total: t,
    pct: t ? Math.round(d / t * 100) : 0
  };
};
const acadBadges = done => [{

}, {

const acadNotes = () => {
  try {
    return JSON.parse(localStorage.getItem('acad_notes') || '{}');
  } catch (e) {
    return {};
  }
};
const getNote = (cid, title) => (acadNotes()[cid] || {})[title] || '';
const setNote = (cid, title, v) => {
  const n = acadNotes();
  n[cid] = n[cid] || {};
  if (v) n[cid][title] = v;else {
    delete n[cid][title];
  }
  try {

};
const acadBooks = () => {

  } catch (e) {
    return [];
  }
};
const isBooked = (cid, title) => acadBooks().some(b => b.courseId === cid && b.title === title);
const toggleBook = (cid, mod, les, title, courseTitle) => {
  let a = acadBooks();
  const idx = a.findIndex(b => b.courseId === cid && b.title === title);
  if (idx >= 0) a.splice(idx, 1);else a.push({
    courseId: cid,
    mod,
    les,
    title,
    courseTitle
  });
  try {

  } catch (e) {}
