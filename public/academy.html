rong><br>إجمالي التكاليف غير المباشرة السنوية: 1,200,000 ريال<br>إجمالي ساعات العمل المباشرة: 60,000 ساعة<br><br>المعدل = 1,200,000 ÷ 60,000 = 20 ريال/ساعة<br><br>مشروع استهلك 5,000 ساعة:<br>التكاليف غير المباشرة = 5,000 × 20 = 100,000 ريال</div><div class="tip-box"><strong>✅ نصيحة:</strong> اختيار أساس التوزيع المناسب يؤثر بشكل كبير على دقة ربحية المشاريع. راجع الأساس دورياً.</div>`

              { title: 'مقدمة في IFRS والإطار المفاهيمي', duration: '2 ساعة', explanation: 'ما هي IFRS ومن يصدرها ولماذا.', content: `<h3>ما هي معايير IFRS؟</h3><p>معايير التقارير المالية الدولية (International Financial Reporting Standards) مجموعة معايير يصدرها <strong>مجلس معايير المحاسبة الدولية (IASB)</strong> لتوحيد لغة التقارير المالية عالمياً لتكون <strong>شفافة وقابلة للمقارنة</strong>.</p><div class="content-box"><strong>📚 IAS أم IFRS؟</strong><br>المعايير القديمة تُسمّى IAS، والحديثة تُسمّى IFRS — وكلها سارية معاً.</div><h3>الخصائص النوعية للمعلومة المالية</h3><ul><li><strong>أساسية:</strong> الملاءمة (Relevance) + التمثيل الصادق (Faithful Representation)</li><li><strong>معزِّزة:</strong> القابلية للمقارنة، القابلية للتحقق، التوقيت المناسب، القابلية للفهم</li></ul><h3>عناصر القوائم المالية</h3><table><tr><th>العنصر</th><th>التعريف</th></tr><tr><td>الأصل</td><td>مورد اقتصادي حالي تسيطر عليه المنشأة نتيجة أحداث سابقة</td></tr><tr><td>الالتزام</td><td>واجب حالي بتحويل مورد اقتصادي</td></tr><tr><td>حقوق الملكية</td><td>الحصة المتبقية في الأصول بعد خصم الالتزامات</td></tr></table><div class="tip-box"><strong>✅ نصيحة:</strong> الإطار المفاهيمي ليس معياراً، لكنه المرجع عند غياب معيار محدد لمعاملة ما.</div>` },
              { title: 'عرض القوائم المالية (IAS 1)', duration: '2 ساعة', explanation: 'مكوّنات مجموعة القوائم المالية الكاملة ومبادئ عرضها.', content: `<h3>IAS 1 — عرض القوائم المالية</h3><h4>مكوّنات المجموعة الكاملة</h4><ol><li>قائمة المركز المالي (الميزانية)</li><li>قائمة الربح أو الخسارة والدخل الشامل الآخر</li><li>قائمة التغيرات في حقوق الملكية</li><li>قائمة التدفقات النقدية</li><li>الإيضاحات (السياسات المحاسبية والتفصيلات)</li></ol><h4>مبادئ أساسية</h4><ul><li><strong>الاستمرارية</strong> (Going Concern)</li><li><strong>أساس الاستحقاق</strong> (Accrual Basis)</li><li><strong>ثبات العرض</strong> والأهمية النسبية والتجميع</li><li><strong>عدم المقاصّة</strong> بين الأصول والالتزامات إلا بإذن المعيار</li></ul><div class="example-box"><strong>💡 التبويب:</strong> تُبوّب الأصول والالتزامات إلى <strong>متداولة وغير متداولة</strong> بناءً على دورة التشغيل (عادة 12 شهراً).</div>` }
            ]

          {
            module: 'الوحدة الثانية: الإيرادات والإيجارات',
            lessons: [
              { title: 'IFRS 15 — نموذج الخطوات الخمس', duration: '3.5 ساعة', explanation: 'الاعتراف بالإيراد من العقود مع العملاء.', content: `<h3>IFRS 15 — الإيراد من العقود مع العملاء</h3><p>المبدأ الأساسي: يُعترف بالإيراد ليعكس <strong>تحويل السلع أو الخدمات</strong> إلى العميل بالمبلغ الذي تتوقع المنشأة استحقاقه مقابلها.</p><h4>نموذج الخطوات الخمس</h4><div class="formula-box"><strong>1. تحديد العقد ← 2. تحديد التزامات الأداء ← 3. تحديد سعر المعاملة ← 4. تخصيص السعر على الالتزامات ← 5. الاعتراف بالإيراد عند/بمرور الوفاء</strong></div><h4>متى يُعترف بالإيراد؟</h4><ul><li><strong>بمرور الوقت (Over time):</strong> عقود المقاولات والخدمات المستمرة — بطريقة نسبة الإنجاز</li><li><strong>في لحظة (Point in time):</strong> بيع البضائع عند انتقال السيطرة للعميل</li></ul><div class="example-box"><strong>💡 مثال (عقد متعدد الالتزامات):</strong><br>شركة تبيع جهازاً + صيانة سنتين مقابل 12,000 ريال.<br>• سعر الجهاز منفرداً: 9,000<br>• سعر الصيانة منفردة: 3,000<br>يُخصَّص السعر: الجهاز 9,000 (يُعترف عند التسليم) والصيانة 3,000 (تُعترف على 24 شهراً = 125 ريال/شهر).</div><div class="content-box"><strong>📚 القيد عند التسليم:</strong><br>من ح/ النقدية 12,000<br>إلى ح/ إيراد بيع الجهاز 9,000<br>إلى ح/ إيراد مؤجّل — صيانة 3,000</div><div class="tip-box"><strong>✅ ملاحظة:</strong> IFRS 15 حلّ محل IAS 18 (الإيراد) و IAS 11 (عقود الإنشاء).</div>` },
              { title: 'IFRS 16 — محاسبة الإيجارات', duration: '3 ساعات', explanation: 'أصل حق الاستخدام والتزام الإيجار لدى المستأجر.', content: `<h3>IFRS 16 — الإيجارات</h3><p>ألغى IFRS 16 لدى <strong>المستأجر</strong> التمييز بين الإيجار التمويلي والتشغيلي، فتُسجَّل <strong>معظم العقود في الميزانية</strong>.</p><h4>محاسبة المستأجر (Lessee)</h4><ul><li>الاعتراف بـ <strong>أصل حق الاستخدام</strong> (Right-of-Use Asset)</li><li>الاعتراف بـ <strong>التزام الإيجار</strong> (Lease Liability) = القيمة الحالية لدفعات الإيجار</li></ul><div class="formula-box"><strong>التزام الإيجار = مجموع (دفعة الإيجار ÷ (1+معدل الخصم)^n)</strong></div><div class="example-box"><strong>💡 مثال:</strong><br>إيجار معدّة 3 سنوات، دفعة سنوية 100,000 آخر كل سنة، معدل الخصم 10%.<br>القيمة الحالية ≈ 100,000 × 2.4869 = <strong>248,690 ريال</strong><br><br>القيد المبدئي:<br>من ح/ أصل حق الاستخدام 248,690<br>إلى ح/ التزام الإيجار 248,690<br><br>لاحقاً: إهلاك الأصل + مصروف فائدة على الالتزام.</div><h4>الاستثناءات</h4><ul><li>الإيجارات قصيرة الأجل (12 شهراً أو أقل)</li><li>الأصول منخفضة القيمة</li></ul><div class="warning-box"><strong>⚠️ الأثر:</strong> يرفع IFRS 16 الأصول والالتزامات ويغيّر نِسب المديونية — انتبه لتأثيره على تعهّدات القروض البنكية (Covenants).</div>` }
            ]
          },
          {
            module: 'الوحدة الثالثة: الأصول وانخفاض القيمة',
            lessons: [
              { title: 'IAS 16 — الممتلكات والآلات والمعدات', duration: '2.5 ساعة', explanation: 'القياس المبدئي واللاحق والإهلاك.', content: `<h3>IAS 16 — الممتلكات والآلات والمعدات</h3><h4>القياس المبدئي (التكلفة)</h4><p>تكلفة الأصل = سعر الشراء + الرسوم الجمركية + تكاليف التجهيز للاستخدام + تكاليف التفكيك المقدّرة.</p><h4>القياس اللاحق — نموذجان</h4><ul><li><strong>نموذج التكلفة:</strong> التكلفة − مجمع الإهلاك − خسائر الانخفاض</li><li><strong>نموذج إعادة التقييم:</strong> القيمة العادلة − الإهلاك اللاحق (يُعاد التقييم دورياً)</li></ul><div class="example-box"><strong>💡 الإهلاك (القسط الثابت):</strong><br>آلة بتكلفة 500,000، قيمة متبقية 50,000، عمر 10 سنوات.<br>الإهلاك السنوي = (500,000 − 50,000) ÷ 10 = <strong>45,000 ريال</strong></div><div class="tip-box"><strong>✅ إهلاك المكوّنات:</strong> تُهلك المكوّنات الجوهرية ذات الأعمار المختلفة كلٌّ على حدة (Component Depreciation).</div>` },
              { title: 'IAS 36 — انخفاض قيمة الأصول', duration: '2.5 ساعة', explanation: 'القيمة القابلة للاسترداد وخسارة الانخفاض.', content: `<h3>IAS 36 — انخفاض قيمة الأصول</h3><p>يضمن ألا يُعرض الأصل بأكثر من <strong>قيمته القابلة للاسترداد</strong>.</p><div class="formula-box"><strong>القيمة القابلة للاسترداد = الأعلى من: (القيمة العادلة − تكاليف البيع) و (القيمة الحالية للتدفقات المستقبلية «القيمة المستخدمة»)</strong></div><div class="formula-box"><strong>خسارة الانخفاض = القيمة الدفترية − القيمة القابلة للاسترداد</strong></div><div class="example-box"><strong>💡 مثال:</strong><br>أصل قيمته الدفترية 800,000.<br>• القيمة العادلة − تكاليف البيع = 620,000<br>• القيمة المستخدمة = 650,000<br>القيمة القابلة للاسترداد = 650,000 (الأعلى)<br>خسارة الانخفاض = 800,000 − 650,000 = <strong>150,000 ريال</strong><br><br>القيد:<br>من ح/ خسارة انخفاض قيمة 150,000<br>إلى ح/ مجمع خسائر الانخفاض 150,000</div><div class="warning-box"><strong>⚠️ الشهرة (Goodwill):</strong> تُختبر سنوياً، ولا يجوز عكس انخفاض قيمتها لاحقاً.</div>` }

          {

              { title: 'IFRS 9 — تصنيف وقياس الأدوات المالية', duration: '3 ساعات', explanation: 'نموذج الأعمال وخصائص التدفقات (SPPI).', content: `<h3>IFRS 9 — الأدوات المالية: التصنيف والقياس</h3><h4>تصنيف الأصول المالية</h4><p>يعتمد على <strong>نموذج الأعمال</strong> + <strong>خصائص التدفقات النقدية التعاقدية (SPPI)</strong>:</p><table><tr><th>الفئة</th><th>الشرط</th></tr><tr><td>التكلفة المطفأة</td><td>الاحتفاظ لتحصيل التدفقات + SPPI</td></tr><tr><td>القيمة العادلة عبر الدخل الشامل (FVOCI)</td><td>التحصيل والبيع + SPPI</td></tr><tr><td>القيمة العادلة عبر الأرباح (FVTPL)</td><td>غير ذلك (بغرض المتاجرة)</td></tr></table><div class="tip-box"><strong>✅ SPPI:</strong> Solely Payments of Principal and Interest — تدفقات تمثّل أصلاً وفائدة فقط.</div>` },
              { title: 'IFRS 9 — الخسائر الائتمانية المتوقعة (ECL)', duration: '2.5 ساعة', explanation: 'نموذج الخسارة المتوقعة بدل المتكبّدة.', content: `<h3>IFRS 9 — الخسائر الائتمانية المتوقعة (ECL)</h3><p>استبدل IFRS 9 نموذج «الخسارة المتكبّدة» (IAS 39) بنموذج <strong>الخسارة المتوقعة</strong> الاستشرافي.</p><h4>المراحل الثلاث</h4><ol><li><strong>المرحلة 1:</strong> ائتمان سليم ← خسارة متوقعة لـ 12 شهراً</li><li><strong>المرحلة 2:</strong> ارتفاع جوهري في مخاطر الائتمان ← خسارة متوقعة على عمر الأداة</li><li><strong>المرحلة 3:</strong> منخفضة القيمة ائتمانياً ← خسارة على العمر + فائدة على الصافي</li></ol><div class="formula-box"><strong>ECL = احتمال التعثّر (PD) × الخسارة عند التعثّر (LGD) × التعرّض عند التعثّر (EAD)</strong></div><div class="example-box"><strong>💡 مثال مبسّط:</strong><br>ذمة مدينة 1,000,000، PD = 2%، LGD = 40%.<br>ECL = 1,000,000 × 2% × 40% = <strong>8,000 ريال</strong> مخصص خسائر ائتمانية متوقعة.</div>` }

    // ============ HOOKS ============
    function useMousePosition() {
      const [p, setP] = useState({ x: 0, y: 0 });
      useEffect(() => {
        const u = (e) => setP({ x: e.clientX, y: e.clientY });
        window.addEventListener('mousemove', u);
        return () => window.removeEventListener('mousemove', u);
      }, []);
      return p;
    }

    function useCountUp(end, duration = 2000) {
      const [count, setCount] = useState(0);
      const [started, setStarted] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setStarted(true); }, { threshold: 0.3 });
        if (ref.current) o.observe(ref.current);
        return () => o.disconnect();
      }, []);
      useEffect(() => {
        if (!started) return;
        let st = null, af;
        const s = (t) => {
          if (!st) st = t;
          const p = Math.min((t - st) / duration, 1);
          setCount(Math.floor(p * end));
          if (p < 1) af = requestAnimationFrame(s);
        };
        af = requestAnimationFrame(s);
        return () => cancelAnimationFrame(af);
      }, [started, end, duration]);
      return { count, ref };
    }

    function useReveal() {
      const ref = useRef(null);
      useEffect(() => {
        const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) e.target.classList.add('visible'); }, { threshold: 0.1 });
        if (ref.current) o.observe(ref.current);
        return () => o.disconnect();
      }, []);
      return ref;
    }

                <div className="flex flex-wrap gap-2">{s.map((x, i) => (<button key={i} className="text-xs px-3 py-1.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/5">{x}</button>))}</div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Testimonials() {
      return (
        <section className="py-24 relative">
          <div className="container mx-auto px-4">
            <div className="text-center mb-16 reveal"><h2 className="text-4xl md:text-5xl font-black mb-4">ماذا يقول <span className="gradient-text">طلابنا</span></h2></div>
            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
              {testimonials.map((t) => (
                <div key={t.id} className="glass p-6 rounded-2xl card-hover reveal">
                  <div className="flex items-center gap-1 mb-4">{[...Array(5)].map((_, i) => (<svg key={i} className="w-5 h-5 text-gold" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>))}</div>
                  <p className="text-textGray mb-6">"{t.text}"</p>
                  <div className="flex items-center gap-3">
                    <div className="w-12 h-12 rounded-full bg-gradient-to-r from-primary to-secondary flex items-center justify-center font-bold text-lg">{t.name[0]}</div>
                    <div><h4 className="font-bold">{t.name}</h4><p className="text-sm text-textGray">{t.role}</p></div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function FAQItem({ faq, isOpen, onClick }) {
      return (
        <div className="glass rounded-2xl overflow-hidden mb-4">
          <button className="w-full flex items-center justify-between p-6 text-right hover:bg-white/5" onClick={onClick}>
            <span className="font-bold text-lg">{faq.question}</span>
            <svg className={`w-6 h-6 text-primary transition-transform ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
          </button>
          <div className={`overflow-hidden transition-all duration-300 ${isOpen ? 'max-h-96' : 'max-h-0'}`}><div className="p-6 pt-0 text-textGray">{faq.answer}</div></div>
        </div>
      );
    }
    function FAQ() {
      const [openIndex, setOpenIndex] = useState(0);
      return (
        <section id="faq" className="py-24 relative">
          <div className="container mx-auto px-4 max-w-4xl">
            <div className="text-center mb-16 reveal"><h2 className="text-4xl md:text-5xl font-black mb-4">الأسئلة <span className="gradient-text">الشائعة</span></h2></div>
            <div>{faqs.map((f, i) => (<FAQItem key={i} faq={f} isOpen={openIndex === i} onClick={() => setOpenIndex(openIndex === i ? -1 : i)} />))}</div>
          </div>
        </section>
      );
    }

    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [selectedCourse, setSelectedCourse] = useState(null);
      const handleCourseClick = (id) => { setSelectedCourse(id); setCurrentPage('course'); };
      const handleBackToHome = () => { setCurrentPage('home'); setSelectedCourse(null); };
      const handleNavigate = (p) => { setCurrentPage(p); setSelectedCourse(null); };
      return (
        <>
          <Navbar onNavigate={handleNavigate} currentPage={currentPage} />
          <main className="min-h-screen">
            {currentPage === 'home' && (<><Hero /><Stats /><Academy onCourseClick={handleCourseClick} /><LearningPath /><ERP /><AIAssistant /><Testimonials /><FAQ /></>)}
            {currentPage === 'course' && selectedCourse && <CourseDetail courseId={selectedCourse} onBack={handleBackToHome} />}
          </main>
          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
